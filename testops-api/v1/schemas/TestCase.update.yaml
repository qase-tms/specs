type: object
properties:
  description:
    type: string
  preconditions:
    type: string
  postconditions:
    type: string
  title:
    type: string
    maxLength: 255
  severity:
    type: integer
  priority:
    type: integer
  behavior:
    type: integer
  type:
    type: integer
  layer:
    type: integer
  is_flaky:
    type: integer
  suite_id:
    type: integer
    format: int64
  milestone_id:
    type: integer
    format: int64
  automation:
    type: integer
    deprecated: true
    description: >-
      Deprecated, use `isManual` and `isToBeAutomated` instead.
      Encodes the test case automation state as a single integer:
      `0` = manual, `1` = manual planned to be automated, `2` = automated.
      If both `automation` and `isManual`/`isToBeAutomated` are provided,
      `isManual` and `isToBeAutomated` take precedence.
  isManual:
    type: boolean
    description: >-
      `true` if the case is manual, `false` if it is automated.
      Combined with `isToBeAutomated`, replaces the deprecated `automation` field.
  isToBeAutomated:
    type: boolean
    description: >-
      `true` if a manual case is planned to be automated, `false` otherwise.
      Only meaningful when `isManual` is `true`; ignored when `isManual` is `false`.
  status:
    type: integer
  steps_type:
    type: string
    enum:
      - classic
      - gherkin
    default: classic
    description: >-
      Determines the format of the steps field.
      When "classic", steps use the standard action/expected_result/data format.
      When "gherkin", steps use the {value: "Given...\nWhen...\nThen..."} format.
  attachments:
    $ref: 'Attachment.hash_list.yaml'
  steps:
    type: array
    items:
      $ref: 'TestStep.create.yaml'
  tags:
    type: array
    items:
      type: string
  params:
    type: object
    nullable: true
    deprecated: true
    description: Deprecated, use `parameters` instead.
    additionalProperties:
      type: array
      items:
        type: string
      nullable: false
  parameters:
    type: array
    nullable: true
    items:
      $ref: 'TestCase.Parameter.Create.yaml'
  custom_field:
    $ref: 'CustomFieldValueMap.partial.yaml'
