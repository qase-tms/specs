openapi: '3.0.0'

info:
  title: Qase.io TestOps API v2
  description: |
    Qase TestOps API v2 Specification.

    ## Rate limiting

    Requests are rate limited per workspace (shared across all API tokens of the
    workspace). The exact limit depends on your subscription plan.

    Every response advertises the current limit state through headers:

    - `RateLimit` and `RateLimit-Policy` — IETF rate-limit headers describing the
      active policy and the remaining quota for the current window.
    - `X-RateLimit-Limit` — maximum number of requests allowed in the window.
    - `X-RateLimit-Remaining` — requests left in the current window.
    - `X-RateLimit-Reset` — Unix timestamp at which the window resets.

    When the limit is exceeded the API responds with `429 Too Many Requests`, a
    `Retry-After` header (seconds to wait before retrying), and the body:

    ```json
    {
      "status": false,
      "errorMessage": "API rate limit exceeded."
    }
    ```

  termsOfService: https://qase.io/terms
  version: 2.0.0

  contact:
    name: Qase.io
    url: https://qase.io
    email: support@qase.io

  license:
    name: Apache 2.0
    url: https://github.com/qase-tms/specs/blob/master/LICENSE

tags:
  - name: custom-fields
  - name: results

servers:
  - url: https://api.qase.io/v2
    description: The production API server.

paths:
  /{project_code}/run/{run_id}/result:
    $ref: './paths/result.yaml'
  /{project_code}/run/{run_id}/results:
    $ref: './paths/results_bulk.yaml'
  /custom_field:
    $ref: './paths/custom_fields.yaml'
  /custom_field/{id}:
    $ref: './paths/custom_field.yaml'

components:
  schemas:
    ResultStep: { $ref: './schemas/ResultStep.yaml' }
    ResultExecution: { $ref: './schemas/ResultExecution.yaml' }
    ResultStepExecution: { $ref: './schemas/ResultStepExecution.yaml' }
    ResultRelations: { $ref: './schemas/ResultRelations.yaml' }
    ResultStatus: { $ref: './schemas/ResultStatus.yaml' }
    CustomField: { $ref: './schemas/CustomField.yaml' }
    CustomFieldOption: { $ref: './schemas/CustomFieldOption.yaml' }

  securitySchemes:
    TokenAuth:
      type: apiKey
      in: header
      name: Token

security:
  - TokenAuth: []
